launch-templates:
  observer-poc:
    resource-class: "docker_linux_amd64/medium"
    image: "ubuntu22.04-node20.11-v10"
    init-steps:
      - name: Checkout
        uses: "nrwl/nx-cloud-workflows/v5/workflow-steps/checkout/main.yaml"
      - name: Container Observer (PoC)
        uses: "barbados-clemens/testing-steps/main/ci-step/template.yaml"
        env:
          OBSERVER_BIN_URL: "https://raw.githubusercontent.com/barbados-clemens/testing-steps/main/bin/observer-linux-amd64"
      - name: Restore Node Modules Cache
        uses: "nrwl/nx-cloud-workflows/v5/workflow-steps/cache/main.yaml"
        inputs:
          key: "package-lock.json"
          paths: "node_modules"
      - name: Install Node Modules
        uses: "nrwl/nx-cloud-workflows/v5/workflow-steps/install-node-modules/main.yaml"

  linux-medium-js-java-flutter:
    resource-class: "docker_linux_amd64/medium"
    image: "ubuntu22.04-node20.11-v10"
    init-steps:
      - name: System Environment Variables
        script: env
      - name: List HOME dir before
        script: ls -al $HOME

      - name: Checkout
        uses: "nrwl/nx-cloud-workflows/cloud-4682-scrub-log-output/workflow-steps/checkout/main.yaml"
      - name: Restore Node Modules Cache
        uses: "nrwl/nx-cloud-workflows/cloud-4682-scrub-log-output/workflow-steps/cache/main.yaml"
        inputs:
          key: "package-lock.json|yarn.lock|pnpm-lock.yaml"
          paths: "node_modules"
          base-branch: "cache-step-expand-globs"
      - name: Restore file from outside workspace root
        uses: "nrwl/nx-cloud-workflows/cloud-4682-scrub-log-output/workflow-steps/cache/main.yaml"
        inputs:
          key: "nx.json|.nx/workflows/**/*"
          paths: |
            "../blah_dir/**/*"
            "../blah.txt"

      - name: "List HOME dir after restore"
        script: |
          ls -al $HOME
          if [ -d "../blah_dir" ]; then
            echo "Directory exists"
            ls -al $HOME/blah_dir
          else
            echo "Directory does not exist"
          fi

      - name: Install Node Modules
        uses: "nrwl/nx-cloud-workflows/cloud-4682-scrub-log-output/workflow-steps/install-node-modules/main.yaml"

      - name: "add blah.txt to HOME dir"
        script: |
          echo $(date +%s) >> $HOME/blah.txt
          mkdir -p $HOME/blah_dir
          echo $(date +%s) >> $HOME/blah_dir/nested.txt

      - name: "List HOME dir after"
        script: |
          ls -al $HOME
          ls -al $HOME/blah_dir
          cat $HOME/blah.txt
          cat $HOME/blah_dir/nested.txt

      - name: "System Environment Variables"
        script: env
